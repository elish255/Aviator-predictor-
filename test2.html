<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Aviator Predictor — Live Odds & Connected Timer</title>
  <!-- Aviator Style Font: Oswald (bold, condensed, high impact) -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* app-like */
    }

    body {
      background: #0B0E14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Oswald', sans-serif;
      padding: 16px;
    }

    /* MAIN PHONE / CARD LAYOUT - matches screenshot dimensions & rounded modern look */
    .predictor-app {
      max-width: 420px;
      width: 100%;
      background: #F5F7FC;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.6), 0 0 0 8px #1E1E2A;
      transition: all 0.2s;
    }

    /* RED TOP SECTION WITH GRADIENT + PLANE ZONE */
    .hero-red {
      background: linear-gradient(145deg, #E21B2C, #B0121F);
      padding: 28px 24px 40px 24px;
      position: relative;
      border-bottom-left-radius: 32px;
      border-bottom-right-radius: 32px;
      overflow: hidden;
    }

    /* dynamic pattern overlay (wind streaks) */
    .hero-red::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(115deg, 
        rgba(255,255,240,0.08) 0px, 
        rgba(255,255,240,0.08) 3px,
        transparent 3px,
        transparent 18px);
      pointer-events: none;
    }

    /* menu + wallet row */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 3;
    }

    .menu-icon, .wallet-icon {
      font-size: 30px;
      font-weight: 500;
      color: white;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
      background: rgba(0,0,0,0.15);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      backdrop-filter: blur(2px);
    }

    /* Logo & plane area */
    .logo-block {
      text-align: center;
      margin-top: 8px;
    }

    .plane-slot {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .custom-plane-img {
      width: 100px;
      height: auto;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25));
      transition: transform 0.2s ease;
      animation: floatPlane 2.4s infinite alternate ease-in-out;
    }

    @keyframes floatPlane {
      0% { transform: translateY(0px) rotate(-1deg); }
      100% { transform: translateY(-8px) rotate(2deg); }
    }

    .logo-block h1 {
      font-size: 38px;
      font-weight: 700;
      color: white;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-style: italic;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      margin-top: 4px;
    }

    /* MAIN CARD (WHITE AREA) */
    .card-white {
      background: #FFFFFF;
      margin: -28px 16px 20px 16px;
      border-radius: 44px;
      padding: 22px 18px 28px;
      box-shadow: 0 18px 32px -12px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 10;
    }

    /* rotating sprinkler + central odds container */
    .roulette-spinner {
      position: relative;
      width: 100%;
      max-width: 270px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* dual rotating rings (sprinkler effect) */
    .ring-primary {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #FF416C, #FF4B2B, #FFD700, #FF416C);
      mask: radial-gradient(circle, transparent 68%, black 72%);
      -webkit-mask: radial-gradient(circle, transparent 68%, black 72%);
      animation: rotateRing 2.8s linear infinite;
    }

    .ring-secondary {
      position: absolute;
      width: 88%;
      height: 88%;
      border-radius: 50%;
      border: 2px dashed rgba(255, 60, 60, 0.5);
      animation: rotateReverse 4s linear infinite;
    }

    @keyframes rotateRing {
      100% { transform: rotate(360deg); }
    }
    @keyframes rotateReverse {
      100% { transform: rotate(-360deg); }
    }

    /* inner white circle with odds */
    .odds-circle {
      width: 78%;
      height: 78%;
      background: white;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08), inset 0 1px 2px white;
      z-index: 5;
      transition: all 0.08s linear;
    }

    .odds-number {
      font-size: 68px;
      font-weight: 800;
      color: #111;
      line-height: 1;
      letter-spacing: -1px;
    }

    .odds-label {
      font-size: 18px;
      font-weight: 500;
      text-transform: uppercase;
      color: #8E8E9A;
      letter-spacing: 1.2px;
      margin-top: 6px;
    }

    /* NEXT ODDS BUTTON — big red, bold */
    .next-odds-btn {
      width: 100%;
      background: #E11D2C;
      border: none;
      padding: 18px 0;
      font-size: 36px;
      font-weight: 700;
      font-family: 'Oswald', sans-serif;
      color: white;
      border-radius: 60px;
      margin-top: 26px;
      cursor: pointer;
      transition: 0.18s linear;
      box-shadow: 0 12px 18px -6px rgba(225, 29, 44, 0.45);
      letter-spacing: 1px;
    }

    .next-odds-btn:active {
      transform: scale(0.97);
      background: #B81322;
    }

    /* AUTO UPDATE TOGGLE (exactly like screenshot: "Update automatically" + checkbox) */
    .auto-update-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #F0F2F8;
      padding: 14px 20px;
      border-radius: 60px;
      margin-top: 28px;
    }

    .auto-text {
      font-size: 23px;
      font-weight: 500;
      color: #1F2A3A;
    }

    /* Custom checkbox stylized but native look for clarity (matches screenshot) */
    .auto-check {
      width: 26px;
      height: 26px;
      accent-color: #E11D2C;
      transform: scale(1.1);
      cursor: pointer;
    }

    /* BOTTOM SECTION: betting site image + connection time (connected & timer) */
    .status-footer {
      background: #11161F;
      margin: 10px 16px 24px 16px;
      border-radius: 34px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bet-site-img {
      width: 64px;
      height: 64px;
      background: #1F2A36;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .bet-site-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder-site {
      font-size: 32px;
      background: #232e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
    }

    .connection-details {
      flex: 1;
    }

    .connected-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 26px;
      font-weight: 600;
      color: #2ECC71;
    }

    .green-led {
      width: 14px;
      height: 14px;
      background: #2ECC71;
      border-radius: 50%;
      box-shadow: 0 0 6px #2ECC71;
      animation: pulseLed 1.5s infinite;
    }

    @keyframes pulseLed {
      0% { opacity: 0.5; transform: scale(0.9);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    .timer-value {
      font-size: 22px;
      font-family: monospace;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: #EFF3FF;
      margin-top: 6px;
    }

    /* responsive */
    @media (max-width: 450px) {
      .predictor-app {
        max-width: 100%;
        border-radius: 32px;
      }
      .odds-number {
        font-size: 58px;
      }
      .next-odds-btn {
        font-size: 30px;
        padding: 14px 0;
      }
      .auto-text {
        font-size: 20px;
      }
      .connected-status {
        font-size: 22px;
      }
    }

    /* hover on button */
    .next-odds-btn:hover {
      filter: brightness(1.03);
      transform: scale(1.01);
    }

    /* pulsate on odds change */
    .odds-pulse {
      animation: oddsPop 0.2s cubic-bezier(0.2, 1.3, 0.4, 1);
    }

    @keyframes oddsPop {
      0% { transform: scale(1); opacity: 0.9;}
      80% { transform: scale(1.08);}
      100% { transform: scale(1);}
    }
  </style>
</head>
<body>

<div class="predictor-app">
  <!-- TOP RED SECTION: plane image, title, menu/wallet -->
  <div class="hero-red">
    <div class="top-bar">
      <div class="menu-icon">☰</div>
      <div class="wallet-icon">⌂</div>
    </div>
    <div class="logo-block">
      <div class="plane-slot">
        <!-- PLACEHOLDER: user can import from storage; we provide an img with id="userPlaneImg" and default data -->
        <img id="userPlaneImg" class="custom-plane-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M21 16L14 9V4C14 2.9 13.1 2 12 2C10.9 2 10 2.9 10 4V9L3 16H5L7 14L9 15V19L7 21H9L10.5 18H13.5L15 21H17L15 19V15L17 16H19L21 16Z'/%3E%3Ccircle cx='12' cy='4.5' r='1.2' fill='%23FFD966'/%3E%3C/svg%3E" alt="Aviator Plane">
      </div>
      <h1>Aviator Predictor</h1>
    </div>
  </div>

  <!-- white content card -->
  <div class="card-white">
    <!-- central odds + rotating sprinkler -->
    <div class="roulette-spinner">
      <div class="ring-primary"></div>
      <div class="ring-secondary"></div>
      <div class="odds-circle">
        <div class="odds-number" id="dynamicOdds">4.12x</div>
        <div class="odds-label">Predicted coefficient</div>
      </div>
    </div>

    <!-- Next Odds button -->
    <button class="next-odds-btn" id="nextOddsBtn">Next Odds</button>

    <!-- Update automatically checkbox (matches screenshot) -->
    <div class="auto-update-row">
      <span class="auto-text">Update automatically</span>
      <input type="checkbox" id="autoUpdateCheck" class="auto-check">
    </div>
  </div>

  <!-- BOTTOM: user selected betting site image + connected timer -->
  <div class="status-footer">
    <div class="bet-site-img" id="betSiteImgContainer">
      <!-- default placeholder (user can replace by uploading) -->
      <img id="betSiteImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23FFB347'%3E%3Crect width='24' height='24' rx='4' fill='%23222'/%3E%3Ctext x='4' y='17' fill='gold' font-size='14'%3E🎲%3C/text%3E%3C/svg%3E" alt="betting site icon">
    </div>
    <div class="connection-details">
      <div class="connected-status">
        <span class="green-led"></span>
        <span>Connected</span>
      </div>
      <div class="timer-value" id="liveTimerDisplay">00 : 13 : 44</div>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // 1) FULL MATCH SCREENSHOT: random odds generation, Next Odds click
  // 2) central rotating sprinkler active
  // 3) timer starts at 00:13:44 exactly and counts UP (connection duration)
  // 4) betting site image can be changed by user (click on image to upload from storage)
  // 5) plane image can be replaced by user click (import from storage)
  // 6) auto-update feature triggers odds every 3 seconds when checkbox is checked
  // 7) realistic odds with 2 decimals, min 1.15x , max ~24x
  // --------------------------------------------------------------

  // DOM elements
  const oddsElement = document.getElementById('dynamicOdds');
  const nextBtn = document.getElementById('nextOddsBtn');
  const autoCheckbox = document.getElementById('autoUpdateCheck');
  const timerDisplay = document.getElementById('liveTimerDisplay');
  const planeImg = document.getElementById('userPlaneImg');
  const betSiteImg = document.getElementById('betSiteImage');

  // ----- TIMER LOGIC: Start at 13 minutes 44 seconds (00:13:44) -----
  let totalSeconds = (13 * 60) + 44;  // 824 seconds -> 13:44
  function updateTimerUI() {
    const hrs = Math.floor(totalSeconds / 3600);
    const mins = Math.floor((totalSeconds % 3600) / 60);
    const secs = totalSeconds % 60;
    const formatted = `${hrs.toString().padStart(2,'0')} : ${mins.toString().padStart(2,'0')} : ${secs.toString().padStart(2,'0')}`;
    timerDisplay.innerText = formatted;
  }
  updateTimerUI();
  // start counting upwards every second
  const timerInterval = setInterval(() => {
    totalSeconds++;
    updateTimerUI();
  }, 1000);

  // ----- ODDS GENERATOR (realistic aviator style) -----
  function generateRandomOdds() {
    // blend: base random between 1.2x and 12x, occasional bursts up to 22x
    let base = 1.2 + Math.random() * 12;
    if (Math.random() < 0.12) base = base * 1.8;  // rare spikes
    let finalVal = Math.min(27.0, Math.max(1.1, base));
    return finalVal.toFixed(2);
  }

  // update odds with animation + number
  function updateOdds(value = null) {
    let newOddsValue;
    if (value !== null && !isNaN(parseFloat(value))) {
      newOddsValue = value;
    } else {
      newOddsValue = generateRandomOdds();
    }
    const oddsWithX = newOddsValue + 'x';
    // add pop animation
    oddsElement.classList.add('odds-pulse');
    oddsElement.innerText = oddsWithX;
    setTimeout(() => {
      oddsElement.classList.remove('odds-pulse');
    }, 200);
  }

  // manual click
  function onNextOdds() {
    updateOdds();
    // subtle vibrate if supported (optional)
    if (navigator.vibrate) navigator.vibrate(20);
  }

  nextBtn.addEventListener('click', onNextOdds);

  // ----- AUTO UPDATE MODE -----
  let autoInterval = null;
  function startAutoUpdate() {
    if (autoInterval) clearInterval(autoInterval);
    autoInterval = setInterval(() => {
      if (autoCheckbox.checked) {
        updateOdds();
      }
    }, 3000); // refresh every 3 sec
  }
  function stopAutoUpdate() {
    if (autoInterval) {
      clearInterval(autoInterval);
      autoInterval = null;
    }
  }
  autoCheckbox.addEventListener('change', (e) => {
    if (e.target.checked) {
      startAutoUpdate();
    } else {
      stopAutoUpdate();
    }
  });
  // initially auto unchecked (matches screenshot, off by default)
  autoCheckbox.checked = false;
  stopAutoUpdate(); // ensure no running

  // ----------------------------------------------
  // IMPORT IMAGES FROM USER STORAGE: plane image + betting site image
  // Provide click actions to match "i can import from my storage"
  // ----------------------------------------------
  
  // 1) Plane image upload (top plane)
  planeImg.style.cursor = 'pointer';
  planeImg.title = 'Click to upload your own plane image';
  planeImg.addEventListener('click', () => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          planeImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        alert('Please select a valid image file.');
      }
    };
    fileInput.click();
  });

  // 2) Betting site image (bottom left) — user can choose any betting logo
  const siteContainer = document.getElementById('betSiteImgContainer');
  betSiteImg.style.cursor = 'pointer';
  betSiteImg.title = 'Click to upload betting site logo';
  betSiteImg.addEventListener('click', () => {
    const fileInputSite = document.createElement('input');
    fileInputSite.type = 'file';
    fileInputSite.accept = 'image/*';
    fileInputSite.onchange = (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const readerSite = new FileReader();
        readerSite.onload = (ev2) => {
          betSiteImg.src = ev2.target.result;
        };
        readerSite.readAsDataURL(file);
      } else {
        alert('Please select an image for betting site.');
      }
    };
    fileInputSite.click();
  });

  // set initial coefficient to exactly 4.12x as screenshot shows
  oddsElement.innerText = '4.12x';
  
  // small extra: add bottom also message for realism but matches perfect
  // also ensure that rotating sprinkler always animates (true by CSS)
  
  // Additional requirements: responsive & realistic fonts
  // if user clicks Next Odds, we generate new random value inside central circle
  // and checkbox auto mode works. Timer counts from 00:13:44.
  
  // bonus: If the auto-update is enabled, the odds change automatically
  // but manual click always overrides and works smoothly.
  // Prevent memory leaks on page unload
  window.addEventListener('beforeunload', () => {
    if (timerInterval) clearInterval(timerInterval);
    if (autoInterval) clearInterval(autoInterval);
  });

  // allow also custom odds value? not needed but realistic predictor
  // final style: we made sure "Aviator Fonts" (Oswald) used everywhere, 
  // Sprinkler rotation consistent, and the betting site image + plane uploaded by user.
  
  // add ability to change betting site image and plane without reloading.
  // full match with screenshot bottom: connected + timer (00:13:44) increasing.
  
  // ensure everything matches the exact text: "Update automatically" checkbox near odds.
  // also slight hover effect
  
  // if auto mode on, and user clicks Next Odds, manual still works & updates value.
  // we are done
  
  // Timer update padding for hours: shows 00 : 13 : 44 then counts upwards.
  // For UI consistency, we keep the exact gap format.
  
  // also add a double check for "connected" led and green dot.
  
  // The page now renders identical to screenshot: top plane image (customizable), central 4.12x,
  // rotating sprinkler, next odds big red, auto toggle, bottom with betting site image and timer.
  
  // optional: 3rd party site select? not needed, user can upload any betting brand logo.
  
  // Nice extra: After odds change, the rotating ring adds excitement.
  
  // To make the predictor realistic: use random but realistic multipliers (1.12x to 22x).
  // Done.
  console.log('Aviator Predictor ready — matches screenshot, image imports active');
</script>

</body>
</html>
