<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Aviator Predictor • Live Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Oswald', sans-serif;
    }

    body{
      background:linear-gradient(135deg,#ff1f2d,#ff3131);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      overflow:hidden;
    }

    .blur-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
    }

    .passkey-modal {
     background:linear-gradient(135deg,#ff1f2d,#ff3131);
      width: 90%;
      max-width: 400px;
      padding: 35px 25px;
      border-radius: 28px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: modalPop 0.4s ease;
    }

    @keyframes modalPop {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .passkey-modal h2 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .passkey-modal input {
      width: 90%;
      padding: 14px;
      margin: 20px 0;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      text-align: center;
      outline: none;
    }

    .passkey-modal button {
      padding: 12px 32px;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #b21f1f;
      transition: 0.2s;
    }

    .passkey-modal button:active {
      transform: scale(0.96);
    }

    .error-msg {
      color: #ffaa00;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    .get-appid-btn {
      margin-top: 20px;
      background: #25D366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .get-appid-btn:hover {
      transform: scale(1.02);
      background: #20b859;
    }

    .support-text {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.8;
    }

    .phone {
      width: 370px;
      max-width: 95%;
      height: 780px;
      background: #f1f1f1;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,.8);
      border: 5px solid #111;
      filter: blur(0px);
      transition: filter 0.3s ease;
    }

    .phone.blurred {
      filter: blur(4px);
      pointer-events: none;
    }

    .top{
      background:linear-gradient(135deg,#ff1f2d,#ff3131);
      height:230px;
      position:relative;
      overflow:hidden;
      border-bottom-left-radius: 55px;
      border-bottom-right-radius: 55px;
    }

    .top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
      border-bottom-left-radius: 55px;
      border-bottom-right-radius: 55px;
      pointer-events: none;
    }

    .top::before{
      content:'';
      position:absolute;
      width:200%;
      height:100%;
      background:repeating-linear-gradient(
        120deg,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 40px,
        transparent 40px,
        transparent 80px
      );
      animation:moveBg 8s linear infinite;
    }

    @keyframes moveBg{
      from{ transform:translateX(0); }
      to{ transform:translateX(-200px); }
    }

    .menu{
      position:absolute;
      top:30px;
      left:25px;
      font-size:28px;
      color:#fff;
      z-index:2;
    }

    .wallet{
      position:absolute;
      top:30px;
      right:25px;
      font-size:24px;
      color:#fff;
      z-index:2;
    }

    .logo{
      position:absolute;
      top:65px;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      z-index:2;
    }

    .logo img{
      width:110px;
      object-fit:contain;
      animation:planeFly 2s ease-in-out infinite alternate;
    }

    @keyframes planeFly{
      from{ transform:translateY(0px) rotate(-2deg); }
      to{ transform:translateY(-8px) rotate(2deg); }
    }

    .logo h1{
      color:#fff;
      font-size:42px;
      font-style:italic;
      font-weight:700;
      letter-spacing:1px;
      text-shadow:0 3px 10px rgba(0,0,0,.2);
    }

    .content{
      padding:20px;
      margin-top:-20px;
      position:relative;
      z-index:5;
    }

    .predict-box{
      width:280px;
      height:280px;
      margin:auto;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .spinner{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:14px solid rgba(0,255,128,.15);
      border-top:14px solid #00ff88;
      animation:spin 2s linear infinite;
      box-shadow:0 0 20px rgba(0,255,128,.4), inset 0 0 20px rgba(0,255,128,.2);
    }

    @keyframes spin{
      100%{ transform:rotate(360deg); }
    }

    .circle{
      width:220px;
      height:220px;
      border-radius:50%;
      background:#fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      z-index:2;
    }

    #odds{
      font-size:72px;
      font-weight:700;
      color:#111;
    }

    .label{
      font-size:24px;
      color:#999;
      margin-top:5px;
    }

    .btn{
      width:100%;
      height:58px;
      border:none;
      border-radius:18px;
      background:#ff2d2d;
      color:#fff;
      font-size:28px;
      font-weight:700;
      cursor:pointer;
      margin-top:30px;
      transition:.2s;
      box-shadow:0 8px 20px rgba(255,0,0,.25);
    }

    .btn:hover{ transform:scale(1.02); }
    .btn:active{ transform:scale(.97); }

    .auto{
      display:flex;
      align-items:center;
      gap:15px;
      margin-top:20px;
      font-size:24px;
      color:#444;
    }

    .auto input{
      width:26px;
      height:26px;
      accent-color:#ff2d2d;
    }

    .bottom{
      position:absolute;
      bottom:50px;
      left:20px;
      right:20px;
  background:#000;
      border-radius:32px;
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .bottom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,200,100,0.4), transparent);
      border-radius: 32px;
    }

    .betting-site{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .betting-site img{
      width:65px;
      height:65px;
      border-radius:15px;
      object-fit:cover;
      background:#1a1f2e;
      border:2px solid #ffaa33;
      box-shadow:0 0 0 2px rgba(0,0,0,0.3);
      filter: none;
    }

    .status{
      color:#00d26a;
      font-size:24px;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .time{
      color:#fff;
      font-size:22px;
      margin-top:6px;
      font-family: monospace;
      letter-spacing: 1px;
    }

    @media(max-width:420px){
      .phone{ width:100%; height:100vh; border-radius:0; }
      .logo h1{ font-size:34px; }
      #odds{ font-size:58px; }
      .btn{ font-size:26px; height:54px; }
      .auto{ font-size:22px; }
      .status{ font-size:22px; }
      .time{ font-size:20px; }
    }
  </style>
</head>
<body>

<div class="phone" id="dashboardPhone">
  <div class="top">
    <div class="menu">☰</div>
    <div class="wallet">⌂</div>
    <div class="logo">
      <img src="plane.png" alt="Plane" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27white%27%3E%3Cpath d=%27M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z%27/%3E%3C/svg%3E'">
      <h1>Aviator Predictor</h1>
    </div>
  </div>

  <div class="content">
    <div class="predict-box">
      <div class="spinner"></div>
      <div class="circle">
        <div id="odds">4.12x</div>
        <div class="label">Predicted coefficient</div>
      </div>
    </div>

    <button class="btn" onclick="generateOdds()">Next Odds</button>

    <div class="auto">
      <input type="checkbox" id="autoUpdate">
      <label for="autoUpdate">Update automatically</label>
    </div>
  </div>

  <div class="bottom">
    <div class="betting-site">
      <img id="siteImage" src="betting-site.jpg" alt="Site">
      <div>
        <div class="status">● Connected✅</div>
        <div class="time" id="timer">00 : 00 : 00</div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAP0PrZlJ2fd6Nbtct8KJPnS3-DFZ6CMns",
    authDomain: "aviator-predictor-49e48.firebaseapp.com",
    projectId: "aviator-predictor-49e48",
    storageBucket: "aviator-predictor-49e48.firebasestorage.app",
    messagingSenderId: "369153377284",
    appId: "1:369153377284:web:87e48bbff408118a1ae151",
    measurementId: "G-7WHZWJRP4Z"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  function getDeviceId() {
    let deviceId = localStorage.getItem("device_id");
    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("device_id", deviceId);
    }
    return deviceId;
  }
  
  let isAuthenticated = sessionStorage.getItem("dashboard_authenticated") === "true";
  
  setTimeout(() => {
    if (!isAuthenticated) {
      showPasskeyModal();
    }
  }, 3000);
  
  const PACKAGES_PAGE_URL = "packages.html";
  
  function showPasskeyModal() {
    const overlay = document.createElement('div');
    overlay.className = 'blur-overlay';
    overlay.innerHTML = `
      <div class="passkey-modal">
        <h2>🔐 Enter App ID</h2>
        <p style="margin-bottom:5px; opacity:0.9;">Enter your valid App ID to access</p>
        <input type="text" id="passkeyInput" placeholder="Enter App ID" autocomplete="off">
        <button id="verifyPasskeyBtn">VERIFY</button>
        <div class="error-msg" id="passkeyError">Invalid App ID. Please try again.</div>
        <div class="support-text">
          <i class="fas fa-headset"></i> Need support?
        </div>
        <button class="get-appid-btn" id="getAppIdBtn">
          <i class="fab fa-whatsapp"></i> GET APP ID
        </button>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('dashboardPhone').classList.add('blurred');
    
    const input = document.getElementById('passkeyInput');
    const verifyBtn = document.getElementById('verifyPasskeyBtn');
    const errorDiv = document.getElementById('passkeyError');
    const getAppIdBtn = document.getElementById('getAppIdBtn');
    
    getAppIdBtn.onclick = () => {
      window.location.href = PACKAGES_PAGE_URL;
    };
    
    async function verifyAppID() {
      const appId = input.value.trim();
      const deviceId = getDeviceId();
      
      if (!appId) {
        errorDiv.innerText = "Please enter App ID";
        errorDiv.style.display = "block";
        return;
      }
      
      verifyBtn.disabled = true;
      verifyBtn.textContent = "Verifying...";
      
      try {
        const doc = await db.collection("app_ids").doc(appId).get();
        
        if (!doc.exists || doc.data().status !== "active") {
          errorDiv.innerText = "Invalid App ID. Please try again.";
          errorDiv.style.display = "block";
          verifyBtn.disabled = false;
          verifyBtn.textContent = "VERIFY";
          return;
        }
        
        const data = doc.data();
        
        if (!data.deviceId) {
          await db.collection("app_ids").doc(appId).update({ deviceId: deviceId });
          authenticateSuccess(overlay);
          return;
        }
        
        if (data.deviceId === deviceId) {
          authenticateSuccess(overlay);
          return;
        }
        
        errorDiv.innerText = "This App ID is already used on another device.";
        errorDiv.style.display = "block";
        verifyBtn.disabled = false;
        verifyBtn.textContent = "VERIFY";
        
      } catch(err) {
        errorDiv.innerText = "Connection error. Try again.";
        errorDiv.style.display = "block";
        verifyBtn.disabled = false;
        verifyBtn.textContent = "VERIFY";
      }
    }
    
    function authenticateSuccess(overlay) {
      sessionStorage.setItem("dashboard_authenticated", "true");
      isAuthenticated = true;
      document.getElementById('dashboardPhone').classList.remove('blurred');
      overlay.remove();
    }
    
    verifyBtn.onclick = verifyAppID;
    input.onkeypress = (e) => { if(e.key === 'Enter') verifyAppID(); };
    
    errorDiv.style.display = "none";
  }
  
  let selectedSiteImage = "betting-site.jpg";
  try {
    const storedSite = sessionStorage.getItem('selectedBettingSite');
    if (storedSite) {
      const siteData = JSON.parse(storedSite);
      if (siteData && siteData.imgSrc) {
        selectedSiteImage = siteData.imgSrc;
      }
    }
  } catch(e) {}
  
  const siteImgElement = document.getElementById('siteImage');
  if (siteImgElement) {
    siteImgElement.src = selectedSiteImage;
    siteImgElement.onerror = function() {
      this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffaa44'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E";
      this.style.background = "#1e2233";
      this.style.padding = "4px";
    };
  }
  
  function generateOdds(){
    let value = (Math.random() * 18.8 + 1.2).toFixed(2);
    document.getElementById('odds').innerHTML = value + 'x';
  }
  
  let seconds = 0;
  function updateTimer(){
    seconds++;
    let hrs = String(Math.floor(seconds / 3600)).padStart(2,'0');
    let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2,'0');
    let secs = String(seconds % 60).padStart(2,'0');
    document.getElementById('timer').innerHTML = `${hrs} : ${mins} : ${secs}`;
  }
  setInterval(updateTimer, 1000);
  document.getElementById('timer').innerHTML = "00 : 00 : 00";
  
  setInterval(() => {
    let auto = document.getElementById('autoUpdate');
    if(auto && auto.checked){
      generateOdds();
    }
  }, 3000);
</script>

</body>
</html>
